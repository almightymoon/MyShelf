# Athar's Shelf — VPS stack (Postgres + MinIO + API + Caddy)
# Usage: cp .env.vps.example .env && docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shelf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shelfpw}
      POSTGRES_DB: ${POSTGRES_DB:-athar_shelf}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shelf} -d ${POSTGRES_DB:-athar_shelf}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb -p local/$${MINIO_BUCKET:-media} || true;
      mc anonymous set download local/$${MINIO_BUCKET:-media};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-media}

  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-shelf}:${POSTGRES_PASSWORD:-shelfpw}@postgres:5432/${POSTGRES_DB:-athar_shelf}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-atharqulimoon@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Roll#947131}
      ADMIN_NAME: ${ADMIN_NAME:-Athar Iqbal}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-media}
      PUBLIC_MEDIA_BASE: ${PUBLIC_MEDIA_BASE:-/media}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-300}
    volumes:
      - ./server/sql:/app/sql:ro

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
