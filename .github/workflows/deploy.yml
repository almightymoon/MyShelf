name: Deploy to Server

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.IP }}" ]; then echo "::error::Secret IP is not set"; exit 1; fi
          if [ -z "${{ secrets.USERNAME }}" ]; then echo "::error::Secret USERNAME is not set"; exit 1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "::error::Secret SSH_PRIVATE_KEY is not set"; exit 1; fi
          echo "All required secrets are present"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            APP_DIR=/var/www/MyShelf
            cd "$APP_DIR"

            echo "==> Pulling latest"
            git fetch origin
            git checkout main 2>/dev/null || git checkout master
            git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)"

            echo "==> Ensuring compose + Dockerfile exist"
            git checkout HEAD -- docker-compose.yml compose.yaml Caddyfile server/Dockerfile server/sql/schema.sql 2>/dev/null || true
            ls -la "$APP_DIR/docker-compose.yml" "$APP_DIR/compose.yaml" "$APP_DIR/server/Dockerfile" || {
              echo "::error::Compose/Dockerfile missing after pull. Repo files:"
              git ls-files | grep -E 'docker-compose|compose\.yaml|Dockerfile|Caddyfile' || true
              ls -la "$APP_DIR"
              exit 1
            }

            if [ ! -f "$APP_DIR/.env" ]; then
              if [ -f "$APP_DIR/.env.vps.example" ]; then
                echo "==> Creating .env from .env.vps.example"
                cp "$APP_DIR/.env.vps.example" "$APP_DIR/.env"
              else
                echo "::error::Missing $APP_DIR/.env"
                exit 1
              fi
            fi

            COMPOSE_FILE="$APP_DIR/docker-compose.yml"
            [ -f "$COMPOSE_FILE" ] || COMPOSE_FILE="$APP_DIR/compose.yaml"

            echo "==> Docker install check"
            DOCKER_BIN="$(command -v docker)"
            echo "docker -> $DOCKER_BIN"
            if echo "$DOCKER_BIN" | grep -q snap; then
              echo "::error::Snap Docker cannot reliably read /var/www (opens as /var/lib/snapd/void/...). Reinstall Docker:"
              echo "  sudo snap remove docker"
              echo "  curl -fsSL https://get.docker.com | sudo sh"
              exit 1
            fi
            docker compose version

            echo "==> Building frontend"
            npm ci
            set -a
            # shellcheck disable=SC1091
            . "$APP_DIR/.env"
            set +a
            export VITE_API_URL="${VITE_API_URL:-}"
            npm run build
            test -d "$APP_DIR/dist"

            echo "==> Restarting Docker stack"
            set -a
            # shellcheck disable=SC1091
            . "$APP_DIR/.env"
            set +a

            docker compose \
              --project-directory "$APP_DIR" \
              -f "$COMPOSE_FILE" \
              up -d --build --remove-orphans

            echo "==> Waiting for API health"
            ok=0
            for i in $(seq 1 40); do
              if curl -fsS http://127.0.0.1/api/health >/dev/null 2>&1 \
                || curl -fsS http://127.0.0.1:4000/api/health >/dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 2
            done
            if [ "$ok" -ne 1 ]; then
              echo "Health check failed"
              docker compose --project-directory "$APP_DIR" -f "$COMPOSE_FILE" ps || true
              docker compose --project-directory "$APP_DIR" -f "$COMPOSE_FILE" logs --tail=100 api || true
              exit 1
            fi

            docker compose --project-directory "$APP_DIR" -f "$COMPOSE_FILE" ps
            echo "==> Deploy complete"
