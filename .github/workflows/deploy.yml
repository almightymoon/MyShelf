name: Deploy to Server

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.IP }}" ]; then echo "::error::Secret IP is not set"; exit 1; fi
          if [ -z "${{ secrets.USERNAME }}" ]; then echo "::error::Secret USERNAME is not set"; exit 1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "::error::Secret SSH_PRIVATE_KEY is not set"; exit 1; fi
          echo "All required secrets are present"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            APP_DIR=/var/www/MyShelf
            cd "$APP_DIR"
            hash -r

            echo "==> Pulling latest"
            git fetch origin
            git checkout main 2>/dev/null || git checkout master
            git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)"

            if [ ! -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env.vps.example" "$APP_DIR/.env"
              echo "==> Created .env from example — edit secrets on the server if needed"
            fi

            DOCKER_BIN="$(command -v docker)"
            if echo "$DOCKER_BIN" | grep -q snap; then
              echo "::error::Snap Docker detected ($DOCKER_BIN). Install official Docker: curl -fsSL https://get.docker.com | sh"
              exit 1
            fi

            echo "==> Building frontend"
            npm ci
            set -a
            # shellcheck disable=SC1091
            . "$APP_DIR/.env"
            set +a
            export VITE_API_URL="${VITE_API_URL:-}"
            npm run build

            echo "==> Docker stack (API on 127.0.0.1:4010 — Apache fronts :80/:443)"
            set -a
            # shellcheck disable=SC1091
            . "$APP_DIR/.env"
            set +a
            docker compose --project-directory "$APP_DIR" -f "$APP_DIR/docker-compose.yml" up -d --build --remove-orphans
            # Stop optional Caddy if it was started earlier and fought Apache
            docker compose --project-directory "$APP_DIR" -f "$APP_DIR/docker-compose.yml" stop caddy 2>/dev/null || true

            echo "==> Apache vhost"
            sudo a2enmod proxy proxy_http rewrite headers ssl 2>/dev/null || true
            sudo cp "$APP_DIR/deploy/apache/myshelf.conf" /etc/apache2/sites-available/myshelf.conf
            sudo a2ensite myshelf.conf
            sudo apache2ctl configtest
            sudo systemctl reload apache2

            echo "==> Health checks"
            ok=0
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:4010/api/health >/dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 2
            done
            if [ "$ok" -ne 1 ]; then
              docker compose --project-directory "$APP_DIR" -f "$APP_DIR/docker-compose.yml" logs --tail=80 api || true
              exit 1
            fi
            curl -fsS http://127.0.0.1:4010/api/health
            echo
            docker compose --project-directory "$APP_DIR" -f "$APP_DIR/docker-compose.yml" ps
            echo "==> Deploy complete. Point DNS A record for myshelf.athariqbal.com → this server, then:"
            echo "    sudo certbot --apache -d myshelf.athariqbal.com"
