name: Deploy to Server

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.IP }}" ]; then echo "::error::Secret IP is not set"; exit 1; fi
          if [ -z "${{ secrets.USERNAME }}" ]; then echo "::error::Secret USERNAME is not set"; exit 1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "::error::Secret SSH_PRIVATE_KEY is not set"; exit 1; fi
          echo "All required secrets are present"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP_DIR=/var/www/MyShelf
            cd "$APP_DIR"
            hash -r

            echo "==> Pulling latest"
            git fetch origin
            git checkout main 2>/dev/null || git checkout master
            git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)"

            if [ ! -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env.vps.example" "$APP_DIR/.env"
            fi

            DOCKER_BIN="$(command -v docker)"
            if echo "$DOCKER_BIN" | grep -q snap; then
              echo "::error::Snap Docker detected. Install official Docker."
              exit 1
            fi

            echo "==> Building frontend (same-origin /api for lab.athariqbal.com)"
            npm ci
            set -a
            # shellcheck disable=SC1091
            . "$APP_DIR/.env"
            set +a
            export VITE_API_URL=
            npm run build

            echo "==> Docker stack (API 127.0.0.1:4010)"
            set -a
            # shellcheck disable=SC1091
            . "$APP_DIR/.env"
            set +a
            docker compose --project-directory "$APP_DIR" -f "$APP_DIR/docker-compose.yml" up -d --build --remove-orphans
            docker rm -f myshelf-caddy-1 2>/dev/null || true

            echo "==> Apache lab.athariqbal.com (does not edit forex/portfolio files)"
            sudo a2enmod proxy proxy_http rewrite headers ssl 2>/dev/null || true
            sudo cp "$APP_DIR/deploy/apache/lab.conf" /etc/apache2/sites-available/lab.conf
            sudo cp "$APP_DIR/deploy/apache/lab-le-ssl.conf" /etc/apache2/sites-available/lab-le-ssl.conf
            sudo a2ensite lab.conf
            # Disable old myshelf names without deleting forex/portfolio
            sudo a2dissite myshelf.conf 2>/dev/null || true
            sudo a2dissite myshelf-80-acme.conf 2>/dev/null || true
            sudo a2dissite myshelf-le-ssl.conf 2>/dev/null || true
            if [ -f /etc/letsencrypt/live/lab.athariqbal.com/fullchain.pem ]; then
              sudo a2ensite lab-le-ssl.conf
            fi
            sudo apache2ctl configtest
            sudo systemctl reload apache2

            echo "==> Health (wait for API boot)"
            ok=0
            for i in $(seq 1 30); do
              if curl -fsS --connect-timeout 2 --max-time 5 http://127.0.0.1:4010/api/health; then
                echo
                ok=1
                break
              fi
              echo "API not ready yet (attempt $i/30)..."
              sleep 2
            done
            if [ "$ok" -ne 1 ]; then
              echo "::error::API health check failed after waiting"
              docker compose --project-directory "$APP_DIR" -f "$APP_DIR/docker-compose.yml" logs --tail=100 api || true
              exit 1
            fi
            curl -fsS --connect-timeout 2 --max-time 5 -H 'Host: lab.athariqbal.com' http://127.0.0.1/api/health; echo
            echo "==> Public: https://lab.athariqbal.com (after DNS A → server + certbot)"
