# HTTPS MyShelf on :7878 (certs from certbot)
# Requires: Listen 7878 (myshelf-port.conf)
<IfModule mod_ssl.c>
<VirtualHost *:7878>
    ServerName myshelf.athariqbal.com
    ServerAlias www.myshelf.athariqbal.com

    DocumentRoot /var/www/MyShelf/dist

    <Directory /var/www/MyShelf/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:4010/api
    ProxyPassReverse /api http://127.0.0.1:4010/api
    ProxyPass /media http://127.0.0.1:4010/media
    ProxyPassReverse /media http://127.0.0.1:4010/media

    ErrorLog ${APACHE_LOG_DIR}/myshelf-7878-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/myshelf-7878-ssl-access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/myshelf.athariqbal.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/myshelf.athariqbal.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
