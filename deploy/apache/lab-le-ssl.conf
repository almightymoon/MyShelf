# lab.athariqbal.com — Athar's Shelf (HTTPS)
# Certs filled by certbot. Does not touch forex/portfolio SSL vhosts.
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName lab.athariqbal.com
    ServerAlias www.lab.athariqbal.com

    DocumentRoot /var/www/MyShelf/dist

    <Directory /var/www/MyShelf/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:4010/api
    ProxyPassReverse /api http://127.0.0.1:4010/api
    ProxyPass /media http://127.0.0.1:4010/media
    ProxyPassReverse /media http://127.0.0.1:4010/media

    ErrorLog ${APACHE_LOG_DIR}/lab-shelf-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/lab-shelf-ssl-access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/lab.athariqbal.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/lab.athariqbal.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
