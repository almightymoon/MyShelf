# Minimal :80 vhost — ONLY for Let's Encrypt HTTP-01 + redirect.
# Uses unique ServerName so forex/portfolio vhosts are untouched.
<VirtualHost *:80>
    ServerName myshelf.athariqbal.com
    ServerAlias www.myshelf.athariqbal.com

    DocumentRoot /var/www/MyShelf/dist

    <Directory /var/www/MyShelf/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /.well-known/acme-challenge/ /var/www/MyShelf/dist/.well-known/acme-challenge/
    <Directory /var/www/MyShelf/dist/.well-known/acme-challenge/>
        Options None
        Require all granted
    </Directory>

    # App lives on :7878
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://myshelf.athariqbal.com:7878%{REQUEST_URI} [R=302,L]
</VirtualHost>
