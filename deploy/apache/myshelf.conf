# Dedicated MyShelf port (does not touch default :80/:443 sites)
Listen 7878

# HTTP on :7878 — reachable as http://72.60.193.51:7878 and http://myshelf.athariqbal.com:7878
<VirtualHost *:7878>
    ServerName myshelf.athariqbal.com
    ServerAlias www.myshelf.athariqbal.com

    DocumentRoot /var/www/MyShelf/dist

    <Directory /var/www/MyShelf/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    # Let Certbot / ACME through if needed on this port (non-standard; main ACME is on :80)
    Alias /.well-known/acme-challenge/ /var/www/MyShelf/dist/.well-known/acme-challenge/
    <Directory /var/www/MyShelf/dist/.well-known/acme-challenge/>
        Options None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:4010/api
    ProxyPassReverse /api http://127.0.0.1:4010/api
    ProxyPass /media http://127.0.0.1:4010/media
    ProxyPassReverse /media http://127.0.0.1:4010/media

    ErrorLog ${APACHE_LOG_DIR}/myshelf-7878-error.log
    CustomLog ${APACHE_LOG_DIR}/myshelf-7878-access.log combined
</VirtualHost>
