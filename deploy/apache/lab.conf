# lab.athariqbal.com — Athar's Shelf (HTTP → HTTPS)
# Only matches this ServerName; forex + portfolio vhosts stay unchanged.
<VirtualHost *:80>
    ServerName lab.athariqbal.com
    ServerAlias www.lab.athariqbal.com

    DocumentRoot /var/www/MyShelf/dist

    <Directory /var/www/MyShelf/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /.well-known/acme-challenge/ /var/www/MyShelf/dist/.well-known/acme-challenge/
    <Directory /var/www/MyShelf/dist/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://lab.athariqbal.com%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/lab-shelf-error.log
    CustomLog ${APACHE_LOG_DIR}/lab-shelf-access.log combined
</VirtualHost>
